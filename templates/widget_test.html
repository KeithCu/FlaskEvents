{% extends "base.html" %}

{% block title %}Widget Test Page{% endblock %}

{% block content %}
<div class="row">
    <!-- Flask Events List -->
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <div class="events-list-widget">
                    <div id="selected-date-display" class="mt-3 mb-3"></div>
                    <div id="events-list" class="event-list">
                    </div>
                    <div class="navigation-buttons mt-3">
                        <div id="prev-day-bottom">« Previous Day</div>
                        <div id="next-day-bottom">Next Day »</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Flask Events -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">Flask Events</h5>
            </div>
            <div class="card-body">
                <div id="events-calendar" class="events-calendar-widget"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
window.EVENT_LINK_ARROW = {{ event_link_arrow|tojson }};
window.LOGGED_IN = {{ logged_in|tojson }};
</script>
<script src="{{ url_for('static', filename='js/widget.js') }}"></script>
{% endblock %}
